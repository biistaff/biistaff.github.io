<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIチャットボット デモ</title>
<style>
  :root { --brand: #7c3aed; }  /* ← 営業先のコーポレートカラーに変える */
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:"Hiragino Sans","Yu Gothic",sans-serif; background:#f1f5f9; display:flex; justify-content:center; padding:24px 12px; }
  .chat { width:100%; max-width:420px; background:#fff; border-radius:16px; box-shadow:0 8px 30px rgba(0,0,0,.12); display:flex; flex-direction:column; height:80vh; min-height:480px; }
  .head { background:var(--brand); color:#fff; padding:14px 18px; border-radius:16px 16px 0 0; }
  .head h1 { font-size:15px; }
  .head p { font-size:11px; opacity:.85; margin-top:2px; }
  .log { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:80%; padding:10px 14px; border-radius:14px; font-size:13px; line-height:1.7; white-space:pre-wrap; }
  .bot { background:#eef2ff; align-self:flex-start; border-bottom-left-radius:4px; }
  .user { background:var(--brand); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
  .quick { padding:0 16px 8px; display:flex; flex-wrap:wrap; gap:6px; }
  .quick button { font-size:11px; padding:6px 10px; border:1px solid var(--brand); color:var(--brand); background:#fff; border-radius:99px; cursor:pointer; }
  .quick button:hover { background:var(--brand); color:#fff; }
  .input { display:flex; gap:8px; padding:12px 16px; border-top:1px solid #e2e8f0; }
  .input input { flex:1; padding:10px 12px; border:1px solid #cbd5e1; border-radius:10px; font-size:13px; }
  .input button { padding:10px 16px; background:var(--brand); color:#fff; border:none; border-radius:10px; font-size:13px; cursor:pointer; }
  .note { text-align:center; font-size:10px; color:#94a3b8; padding:6px; }
</style>
</head>
<body>
<div class="chat">
  <div class="head">
    <h1 id="botName">〇〇株式会社 AIサポート</h1>
    <p>24時間自動応答デモ｜ビイスタッフAIパートナーズ 制作</p>
  </div>
  <div class="log" id="log"></div>
  <div class="quick" id="quick"></div>
  <div class="input">
    <input id="q" placeholder="質問を入力してください" onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()">送信</button>
  </div>
  <div class="note">※これは架空の会社を使ったサンプルデモです。御社の資料をもとに、同様のボットを2週間で構築します（定型応答型・サーバ費用不要）</div>
</div>
<script>
/* ==============================================
   営業先ごとにここだけ書き換える（会社名・FAQ）
   FAQは営業先の公開サイトから作成する
   ============================================== */
const CONFIG = {
    "botName":  "ひまわり音楽教室（架空の教室） AIサポート",
    "greeting":  "サンプル教室「ひまわり音楽教室」のAIサポートです。\nレッスンに関するご質問をどうぞ。下のボタンからも選べます。",
    "fallback":  "申し訳ありません、その質問はサンプルデモの想定外でした。\n実際の納品では、御社のよくある質問・資料に合わせて回答を作り込みます。",
    "faq":  [
                {
                    "q":  "何歳から通える？",
                    "keys":  [
                                 "何歳",
                                 "年齢",
                                 "子供",
                                 "幼児",
                                 "大人"
                             ],
                    "a":  "3歳のお子様から70代の方まで通っていただいています。年齢に合わせたカリキュラムをご用意していますので、何歳からでも始められます。"
                },
                {
                    "q":  "初心者でも大丈夫？",
                    "keys":  [
                                 "初心者",
                                 "経験",
                                 "楽譜",
                                 "初めて"
                             ],
                    "a":  "生徒さんの8割は未経験からのスタートです。楽譜が読めなくても、講師が一から丁寧にサポートしますのでご安心ください。"
                },
                {
                    "q":  "レッスンの振替はできる？",
                    "keys":  [
                                 "振替",
                                 "休み",
                                 "欠席",
                                 "変更"
                             ],
                    "a":  "前日までにご連絡いただければ、月1回まで振替が可能です。学校行事やご家庭のご都合にも柔軟に対応します。"
                },
                {
                    "q":  "月謝はいくら？",
                    "keys":  [
                                 "月謝",
                                 "料金",
                                 "費用",
                                 "入会金"
                             ],
                    "a":  "月3回・30分レッスンで月謝8,000円、入会金は5,000円です。体験レッスン当日のご入会で入会金は半額になります。"
                },
                {
                    "q":  "楽器を持っていなくても平気？",
                    "keys":  [
                                 "楽器",
                                 "持っていない",
                                 "購入",
                                 "レンタル"
                             ],
                    "a":  "教室の楽器でレッスンできますので、すぐにご購入いただく必要はありません。ご自宅用の楽器選びもご予算に合わせてアドバイスします。"
                },
                {
                    "q":  "発表会はある？",
                    "keys":  [
                                 "発表会",
                                 "イベント",
                                 "参加",
                                 "コンクール"
                             ],
                    "a":  "年1回、地域ホールで発表会を開催しています。参加は自由です。人前で弾く経験は上達の大きなきっかけになりますよ。"
                }
            ]
};
/* ============================================== */

const log = document.getElementById("log");
document.getElementById("botName").textContent = CONFIG.botName;

function add(text, who){
  const d = document.createElement("div");
  d.className = "msg " + who;
  d.textContent = text;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

function answer(text){
  const t = text.toLowerCase();
  let best = null, bestScore = 0;
  for(const f of CONFIG.faq){
    const score = f.keys.filter(k => t.includes(k.toLowerCase())).length;
    if(score > bestScore){ bestScore = score; best = f; }
  }
  return best ? best.a : CONFIG.fallback;
}

function send(fromBtn){
  const input = document.getElementById("q");
  const text = fromBtn || input.value.trim();
  if(!text) return;
  add(text, "user");
  input.value = "";
  setTimeout(() => add(answer(text), "bot"), 500);
}

/* 初期表示 */
add(CONFIG.greeting, "bot");
const quick = document.getElementById("quick");
CONFIG.faq.forEach(f => {
  const b = document.createElement("button");
  b.textContent = f.q;
  b.onclick = () => send(f.q);
  quick.appendChild(b);
});
</script>
</body>
</html>
